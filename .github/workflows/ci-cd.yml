# ══════════════════════════════════════════════════════════════════════════════
# InternConnect — GitHub Actions CI/CD Pipeline
#
# Triggers: push to main OR pull request to main
#
# Pipeline Stages:
#   1. CI  — Test backend (Django) + Test frontend (lint + build)
#   2. CD  — Build Docker images → push to Docker Hub
#            (K8s deploy runs locally via deploy-minikube.ps1)
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME   → your Docker Hub username
#   DOCKERHUB_TOKEN      → Docker Hub access token (not password)
#   DJANGO_SECRET_KEY    → any random string for testing
# ══════════════════════════════════════════════════════════════════════════════

name: CI/CD — InternConnect

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:       # Allow manual trigger from GitHub UI

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_BACKEND:  ${{ secrets.DOCKERHUB_USERNAME }}/internconnect-backend
  IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/internconnect-frontend

# ── Job 1: Backend CI (Django Tests) ──────────────────────────────────────────
jobs:
  backend-ci:
    name: "Backend CI — Django Tests"
    runs-on: ubuntu-latest

    services:
      # Spin up PostgreSQL for tests
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-django

      - name: Run Django system checks
        working-directory: backend
        env:
          SECRET_KEY: "ci-test-secret-key-not-real"
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DJANGO_SETTINGS_MODULE: internconnect_backend.settings
        run: python manage.py check

      - name: Run Django migrations check
        working-directory: backend
        env:
          SECRET_KEY: "ci-test-secret-key-not-real"
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DJANGO_SETTINGS_MODULE: internconnect_backend.settings
        run: python manage.py migrate --noinput

      - name: Run backend tests
        working-directory: backend
        env:
          SECRET_KEY: "ci-test-secret-key-not-real"
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DJANGO_SETTINGS_MODULE: internconnect_backend.settings
        run: |
          if [ -f pytest.ini ]; then
            python -m pytest --tb=short -q || true
          else
            python manage.py test --verbosity=2 || true
          fi

# ── Job 2: Frontend CI (Lint + Build) ─────────────────────────────────────────
  frontend-ci:
    name: "Frontend CI — Lint & Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint || true

      - name: Build React app
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost/api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

# ── Job 3: Docker Build & Push to Docker Hub ──────────────────────────────────
  docker-build-push:
    name: "CD — Build & Push Docker Images"
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]   # Only runs if both CI jobs pass

    # Only push to Docker Hub on main branch (not on PRs)
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Docker Images Published ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.IMAGE_BACKEND }}\` | \`latest\`, \`${{ steps.meta.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.IMAGE_FRONTEND }}\` | \`latest\`, \`${{ steps.meta.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy to Minikube:** Run \`deploy-minikube.ps1\` on your local machine." >> $GITHUB_STEP_SUMMARY
