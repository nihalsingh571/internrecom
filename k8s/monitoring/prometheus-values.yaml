# Prometheus Helm values for Minikube deployment
# Install with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install prometheus prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace \
#     -f k8s/monitoring/prometheus-values.yaml

prometheus:
  prometheusSpec:
    # Scrape all namespaces including internconnect
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false

    # Reduced retention for Minikube (saves disk)
    retention: 7d
    retentionSize: "2GB"

    # Resource limits for Minikube
    resources:
      requests:
        memory: "400Mi"
        cpu: "200m"
      limits:
        memory: "800Mi"
        cpu: "500m"

    # Persistent storage for metrics
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

  # Scrape interval
  config:
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

# Scrape internconnect namespace pods
additionalScrapeConfigs:
  - job_name: internconnect-backend
    static_configs:
      - targets: ['backend-service.internconnect.svc.cluster.local:8000']
    metrics_path: /metrics

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"

# Disable heavy components for Minikube resource savings
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
