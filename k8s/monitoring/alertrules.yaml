# PrometheusRule — Alert rules for InternConnect cluster
# Apply with: kubectl apply -f k8s/monitoring/alertrules.yaml -n monitoring
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: internconnect-alerts
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: prometheus
spec:
  groups:
    # ── Pod Health Alerts ────────────────────────────────────────────────────
    - name: internconnect.pod.health
      rules:
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="internconnect"}[5m]) * 60 > 3
          for: 2m
          labels:
            severity: critical
            namespace: internconnect
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: "Pod {{ $labels.pod }} in namespace internconnect has restarted more than 3 times in 5 minutes."

        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{namespace="internconnect", condition="true"} == 0
          for: 5m
          labels:
            severity: warning
            namespace: internconnect
          annotations:
            summary: "Pod {{ $labels.pod }} is not ready"
            description: "Pod {{ $labels.pod }} has been in a non-ready state for more than 5 minutes."

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas{namespace="internconnect"}
            != kube_deployment_status_available_replicas{namespace="internconnect"}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.deployment }} has missing replicas"
            description: "Deployment {{ $labels.deployment }} has {{ $value }} fewer replicas than desired."

    # ── CPU Alerts ───────────────────────────────────────────────────────────
    - name: internconnect.cpu
      rules:
        - alert: HighCPUUsage
          expr: |
            sum(rate(container_cpu_usage_seconds_total{namespace="internconnect", container!=""}[2m]))
            by (pod, container)
            / sum(kube_pod_container_resource_limits{namespace="internconnect", resource="cpu"})
            by (pod, container) > 0.80
          for: 2m
          labels:
            severity: warning
            namespace: internconnect
          annotations:
            summary: "High CPU on {{ $labels.pod }}"
            description: "Container {{ $labels.container }} in {{ $labels.pod }} is using >80% CPU for 2+ minutes."

        - alert: CriticalCPUUsage
          expr: |
            sum(rate(container_cpu_usage_seconds_total{namespace="internconnect", container!=""}[2m]))
            by (pod, container)
            / sum(kube_pod_container_resource_limits{namespace="internconnect", resource="cpu"})
            by (pod, container) > 0.95
          for: 1m
          labels:
            severity: critical
            namespace: internconnect
          annotations:
            summary: "Critical CPU on {{ $labels.pod }}"
            description: "Container {{ $labels.container }} in {{ $labels.pod }} is using >95% CPU."

    # ── Memory Alerts ────────────────────────────────────────────────────────
    - name: internconnect.memory
      rules:
        - alert: HighMemoryUsage
          expr: |
            sum(container_memory_working_set_bytes{namespace="internconnect", container!=""})
            by (pod, container)
            / sum(kube_pod_container_resource_limits{namespace="internconnect", resource="memory"})
            by (pod, container) > 0.85
          for: 5m
          labels:
            severity: warning
            namespace: internconnect
          annotations:
            summary: "High memory on {{ $labels.pod }}"
            description: "Container {{ $labels.container }} in {{ $labels.pod }} using >85% memory."

    # ── Database Alerts ──────────────────────────────────────────────────────
    - name: internconnect.database
      rules:
        - alert: PostgresDown
          expr: |
            kube_pod_status_ready{namespace="internconnect", pod=~"postgres.*", condition="true"} == 0
          for: 1m
          labels:
            severity: critical
            namespace: internconnect
          annotations:
            summary: "PostgreSQL pod is down"
            description: "PostgreSQL pod {{ $labels.pod }} is not ready. Database may be unavailable."

        - alert: PersistentVolumeFillingUp
          expr: |
            kubelet_volume_stats_available_bytes{namespace="internconnect"}
            / kubelet_volume_stats_capacity_bytes{namespace="internconnect"} < 0.15
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PV {{ $labels.persistentvolumeclaim }} is filling up"
            description: "PersistentVolume for {{ $labels.persistentvolumeclaim }} has less than 15% space left."
