# Kubernetes Secret - base64 encoded values for sensitive data
# To encode: echo -n "your_value" | base64
# To apply:  kubectl apply -f k8s/secrets.yaml -n internconnect
#
# NOTE: Never commit real secrets. Replace placeholders before applying.
apiVersion: v1
kind: Secret
metadata:
  name: internconnect-secrets
  namespace: internconnect
type: Opaque
stringData:
  DB_NAME: internconnect_db
  DB_USER: internconnect_user
  DB_PASSWORD: internconnect_pass
  DB_HOST: postgres-service
  DB_PORT: "5432"
  REDIS_URL: redis://redis-service:6379/0
  SECRET_KEY: django-insecure-change-this-in-production
  GOOGLE_CLIENT_ID: your_google_client_id
  GOOGLE_CLIENT_SECRET: your_google_client_secret
  GITHUB_CLIENT_ID: your_github_client_id
  GITHUB_CLIENT_SECRET: your_github_client_secret
  GEMINI_API_KEY: your_gemini_api_key
